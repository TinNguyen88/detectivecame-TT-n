name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Generate package-lock.json if missing
      run: |
        if [ ! -f package-lock.json ]; then
          echo "package-lock.json not found! Generating a new one..."
          npm install --package-lock-only
        fi

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Linter & Type Check
      run: npm run lint

    - name: Build Application
      run: npm run build
      env:
        NODE_ENV: production

    - name: Google Auth
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && secrets.GCP_SA_KEY != ''
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up Cloud SDK
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && secrets.GCP_SA_KEY != ''
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: Deploy to Cloud Run
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && secrets.GCP_SA_KEY != ''
      run: |
        gcloud run deploy hidden-camera-detector \
          --source . \
          --region asia-southeast1 \
          --allow-unauthenticated \
          --set-env-vars=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

